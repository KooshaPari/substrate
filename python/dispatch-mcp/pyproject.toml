[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dispatch-mcp"
version = "0.1.0"
description = "MCP service for tier-based dispatch delegation"
requires-python = ">=3.13"
license = {text = "Apache-2.0"}
authors = [
  {name = "Phenotype Inc."},
]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.13",
]
dependencies = [
  "fastmcp>=3.2.4,<4.0.0",
  "httpx>=0.27.0,<0.29.0",
]

[project.optional-dependencies]
dev = [
  "pytest-cov>=4.0,<5.0",
]

[project.scripts]
dispatch-mcp = "dispatch_mcp.server:main"

[tool.ruff]
line-length = 100
target-version = "py313"
exclude = [".venv/", "build/", "dist/", "__pycache__/", "*.egg-info/"]

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes
  "W",    # pycodestyle warnings
  "I",    # isort
  "N",    # pep8-naming
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "A",    # flake8-builtins
  "C4",   # flake8-comprehensions
  "DTZ",  # flake8-datetimez
  "T20",  # flake8-print
  "PT",   # flake8-pytest-style
  "Q",    # flake8-quotes
  "RET",  # flake8-return
  "SIM",  # flake8-simplify
  "ARG",  # flake8-unused-arguments
  "PL",   # pylint
  "RUF",  # ruff-specific rules
]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Tests intentionally use inline imports for late-binding against `patch`
# (e.g. `from dispatch_mcp.server import dispatch_custom` inside a `with
# patch("dispatch_mcp.server._client"):` block) so the lookup happens
# after the mock is installed. The standard pytest pattern.
"tests/**" = ["PLC0415"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --cov=dispatch_mcp --cov-report=term-missing --cov-fail-under=80"

[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.coverage.run]
branch = true
source = ["src/dispatch_mcp"]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = false
