[package]
name = "sharecli-ipc"
version = "0.1.0"
edition = "2021"
description = "IPC server for sharecli desktop client — Unix socket JSON-RPC"

[dependencies]
sharecli = { path = "../../" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing = "0.1"
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1"
dirs = "5"

[[bin]]
name = "sharecli-ipc"
path = "src/main.rs"
