[package]
name = "sharecli-ipc"
version = "0.1.0"
edition = "2021"
description = "IPC server + coalesce/debounce/queue primitives for sharecli — Unix socket JSON-RPC + Lock-Wait-Cache command deduplication"

[dependencies]
# Coalesce/cache primitives
sha2 = "0.11"
fs2 = "0.4"
tempfile = "3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Errors
anyhow = "1"

# Process liveness probe (kill(pid, 0)) for serve-lock staleness detection
libc = "0.2"

# WS client
tokio-tungstenite = { version = "0.26", features = ["connect"] }
futures-util = "0.3"

# IPC server (bin only)
sharecli = { path = "../../" }
tokio = { version = "1", features = ["full"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing = "0.1"
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1"
dirs = "5"

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "sharecli-ipc"
path = "src/main.rs"
