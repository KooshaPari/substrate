[package]
name = "substrate_throttle"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Build-contention throttle for substrate dispatch — Zig C-ABI semaphore + posix_spawn + setpriority. Upstream-sync target of KooshaPari/sharecli#16."

[features]
default = []
# When on, exposes the async `acquire_build_permit` and `ProcessPool`-style
# integration. Without this feature the crate still compiles and exports the
# `SpawnPolicyConfig` data type for downstream callers to feed into their own
# throttle gate.
async = ["dep:tokio"]

[dependencies]
tokio = { version = "1", features = ["rt", "sync", "macros", "time"], optional = true }
anyhow = { workspace = true }
tracing = { workspace = true }

[build-dependencies]
# Build script invokes `zig build` on `../spawn-core` and produces
# `libspawn_core.a` (C-ABI static library).
which = "6"

[lib]
path = "src/lib.rs"