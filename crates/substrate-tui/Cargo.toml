[package]
name = "substrate-tui"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Terminal UI dashboard for the substrate dispatch surface"

[lib]
name = "substrate_tui"
path = "src/lib.rs"

[[bin]]
name = "substrate-tui"
path = "src/main.rs"

[dependencies]
# workspace
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "io-util", "sync", "time"] }
reqwest = { workspace = true }
anyhow = { workspace = true }
uuid = { workspace = true }
clap = { workspace = true }

# TUI stack
ratatui = "0.30"
crossterm = { version = "0.28", features = ["event-stream"] }

# dispatch-bridge types are used for wire-format compatibility
substrate-core = { path = "../substrate-core" }
