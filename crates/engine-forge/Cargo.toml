[package]
name = "engine-forge"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "FORGE engine adapter implementing EnginePort by driving the forge CLI."

[dependencies]
substrate-core = { path = "../substrate-core" }
engine-spec = { path = "../engine-spec" }
serde.workspace = true
serde_json.workspace = true
async-trait.workspace = true
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "process", "io-util", "time", "sync", "fs"] }
regex.workspace = true
uuid.workspace = true
thiserror.workspace = true

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt", "time", "process", "fs"] }
