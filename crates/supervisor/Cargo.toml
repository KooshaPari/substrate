[package]
name = "supervisor"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Supervisor loop managing one teammate lane: spawn, pump, restart, resume-400 fallback over EnginePort."
rust-version.workspace = true

[dependencies]
substrate-core = { version = "0.3.0", path = "../substrate-core" }
a2a = { version = "0.3.0", path = "../a2a" }
store-sqlite = { version = "0.3.0", path = "../store-sqlite" }
tempfile = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
substrate-core = { version = "0.3.0", path = "../substrate-core" }
a2a = { version = "0.3.0", path = "../a2a" }
store-sqlite = { version = "0.3.0", path = "../store-sqlite" }

[features]
default = []
