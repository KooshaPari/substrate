[package]
name = "wave"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Phase 4: parallel wave runner — N concurrent teammate lanes with sub-subagent fan-out and harvested results."

[dependencies]
substrate-core = { version = "0.3.0", path = "../substrate-core" }
a2a = { version = "0.3.0", path = "../a2a" }
store-sqlite = { version = "0.3.0", path = "../store-sqlite" }
supervisor = { version = "0.3.0", path = "../supervisor" }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync"] }
uuid = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
regex = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "time"] }
substrate-core = { version = "0.3.0", path = "../substrate-core" }
a2a = { version = "0.3.0", path = "../a2a" }
store-sqlite = { version = "0.3.0", path = "../store-sqlite" }
supervisor = { version = "0.3.0", path = "../supervisor" }

[features]
default = []
