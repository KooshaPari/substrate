[package]
name = "substrate"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Rust SDK facade: hexagonal ports, domain types, dispatch planner, and optional adapters."
readme = "README.md"
keywords = ["agent", "dispatch", "hexagonal", "orchestration", "substrate"]
categories = ["development-tools", "asynchronous"]

[features]
default = ["app", "spec"]
app = ["dep:substrate-app"]
spec = ["dep:engine-spec"]
a2a = ["dep:a2a"]

[dependencies]
substrate-core = { version = "0.3.7", path = "../substrate-core" }
substrate-app = { version = "0.3.7", path = "../substrate-app", optional = true }
engine-spec = { version = "0.3.7", path = "../engine-spec", optional = true }
a2a = { package = "substrate-a2a", version = "0.3.7", path = "../a2a", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
