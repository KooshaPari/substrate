[package]
name = "sharecli-fleet"
version = "0.1.0"
edition = "2021"
description = "Fleet registry and thermal governor for sharecli — NATS-based device coordination"
license = "MIT"

[dependencies]
async-nats = "0.49"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
