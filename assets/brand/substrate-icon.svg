<?xml version="1.0" encoding="UTF-8"?>
<!--
  substrate brand icon — Backbone-2 palette (decision 2026-07-06 by substrate-mesh).
  Sync-violet dominant (substrate = dispatch/routing/sync mesh).
  Six-node mesh hexagon with pulse-green mesh-line glow at the active edge.
  Single warm-amber accent on the central dispatch node (the live router).

  Family cohesion: shares panel base #161b22 with sharecli.
  Pulse-green: #3fb950 | sync-violet: #a371f7 | warm-amber: #d29922
  Background: #0a0d12 graphite-black | panel: #161b22

  Source-of-truth: this file. All raster exports derive from this 1024x1024 SVG.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="substrate">
  <title>substrate</title>
  <desc>Backbone-2 mark: sync-violet dispatch mesh on graphite panel.</desc>

  <defs>
    <!-- Graphite panel with subtle inner glow -->
    <radialGradient id="substrate-panel-glow" cx="50%" cy="50%" r="65%">
      <stop offset="0%"  stop-color="#1d2530" stop-opacity="1"/>
      <stop offset="65%" stop-color="#161b22" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0d12" stop-opacity="1"/>
    </radialGradient>

    <!-- Sync-violet glow for the hexagon stroke -->
    <linearGradient id="substrate-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#a371f7" stop-opacity="0.65"/>
      <stop offset="50%"  stop-color="#a371f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0.65"/>
    </linearGradient>

    <!-- Pulse-green mesh-line glow -->
    <linearGradient id="substrate-pulse-mesh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3fb950" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#3fb950" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>

    <!-- Amber dispatch-node glow -->
    <radialGradient id="substrate-amber-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#d29922" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d29922" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#d29922" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft drop shadow -->
    <filter id="substrate-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="0" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer graphite background -->
  <rect width="1024" height="1024" rx="208" ry="208" fill="#0a0d12"/>

  <!-- Panel: rounded-rect inset with glow gradient -->
  <rect x="64" y="64" width="896" height="896" rx="160" ry="160"
        fill="url(#substrate-panel-glow)"
        stroke="#a371f7" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Hexagon vertices (the dispatch mesh nodes) -->
  <!-- Hex centered at (512, 512), radius 320 -->
  <!-- Vertices at angles 0°, 60°, 120°, 180°, 240°, 300° -->
  <g filter="url(#substrate-shadow)">
    <polygon points="832,512 672,768 352,768 192,512 352,256 672,256"
             fill="none"
             stroke="url(#substrate-violet)"
             stroke-width="32"
             stroke-linejoin="round"/>
  </g>

  <!-- Mesh connections: full-mesh lines between every pair of vertices -->
  <!-- Six vertices: 832,512 / 672,768 / 352,768 / 192,512 / 352,256 / 672,256 -->
  <g stroke="#a371f7" stroke-width="3" stroke-opacity="0.5" fill="none">
    <line x1="832" y1="512" x2="352" y2="768"/>
    <line x1="832" y1="512" x2="192" y2="512"/>
    <line x1="832" y1="512" x2="352" y2="256"/>
    <line x1="832" y1="512" x2="672" y2="256"/>
    <line x1="672" y1="768" x2="192" y2="512"/>
    <line x1="672" y1="768" x2="352" y2="256"/>
    <line x1="672" y1="768" x2="672" y2="256"/>
    <line x1="352" y1="768" x2="352" y2="256"/>
    <line x1="352" y1="768" x2="672" y2="256"/>
    <line x1="352" y1="768" x2="192" y2="512"/>
    <line x1="192" y1="512" x2="672" y2="256"/>
    <line x1="192" y1="512" x2="352" y2="256"/>
  </g>

  <!-- Pulse-green mesh-line glow: a horizontal sweep across the active edge -->
  <!-- Substrate's "auto-reroute-up" semantics: pulse traveling on the bottom edge -->
  <line x1="352" y1="768" x2="672" y2="768"
        stroke="url(#substrate-pulse-mesh)" stroke-width="14" stroke-linecap="round"/>

  <!-- Vertex nodes (filled circles at the 6 hexagon corners) -->
  <g fill="#a371f7">
    <circle cx="832" cy="512" r="22"/>
    <circle cx="672" cy="768" r="22"/>
    <circle cx="352" cy="768" r="22"/>
    <circle cx="192" cy="512" r="22"/>
    <circle cx="352" cy="256" r="22"/>
    <circle cx="672" cy="256" r="22"/>
  </g>

  <!-- Central dispatch node with warm-amber hot pixel -->
  <circle cx="512" cy="512" r="96" fill="url(#substrate-amber-glow)"/>
  <circle cx="512" cy="512" r="36" fill="#d29922"/>
  <circle cx="512" cy="512" r="16" fill="#0a0d12"/>

  <!-- Tiny corner accents (infra feel) -->
  <g fill="#a371f7" opacity="0.45">
    <rect x="112" y="112" width="36" height="8"  rx="3"/>
    <rect x="112" y="112" width="8"  height="36" rx="3"/>
    <rect x="876" y="112" width="36" height="8"  rx="3"/>
    <rect x="904" y="112" width="8"  height="36" rx="3"/>
    <rect x="112" y="904" width="36" height="8"  rx="3"/>
    <rect x="112" y="876" width="8"  height="36" rx="3"/>
    <rect x="876" y="904" width="36" height="8"  rx="3"/>
    <rect x="904" y="876" width="8"  height="36" rx="3"/>
  </g>
</svg>