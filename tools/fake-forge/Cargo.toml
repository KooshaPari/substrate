[package]
name = "fake-forge"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "A network-free stand-in for the forge CLI, used by tests and the --fake flag."

[[bin]]
name = "fake-forge"
path = "src/main.rs"

[[bin]]
name = "bench-fake-forge"
path = "src/bench_main.rs"
description = "Bench harness variant: prints a conv-id and exits, regardless of argv. Used by the F5 bench to measure daemon-dispatch overhead (the daemon builds the argv)."
