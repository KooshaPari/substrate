[workspace]
resolver = "2"
members = [
    "crates/substrate-core",
    "crates/engine-spec",
    "crates/engine-forge",
    "crates/transport-file",
    "crates/store-file",
    "crates/substrate-app",
    "crates/driver-cli",
    "crates/arch-test",
    "crates/omniroute-adapter",
    "tools/fake-forge",
]
[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/KooshaPari/substrate"
rust-version = "1.80"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
uuid = { version = "1.11", features = ["v4", "serde"] }
async-trait = "0.1"
tokio = { version = "1.42", features = ["rt", "rt-multi-thread", "macros", "process", "io-util"] }
regex = "1.11"
anyhow = "1.0"
clap = { version = "4.5", features = ["derive", "env"] }
toml = "0.8"
tempfile = "3.14"
assert_cmd = "2.0"
predicates = "3.1"
dotenvy = "0.15"

[profile.release]
strip = true
