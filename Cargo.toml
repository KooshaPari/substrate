[package]
name = "sharecli"
version = "0.1.0"
edition = "2021"
description = "Shared CLI process manager for multi-project agent orchestration"
license = "MIT"
authors = ["Phenotype"]
repository = "https://github.com/KooshaPari/sharecli"

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive", "env"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"

# Config
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Process management (substrate SDK + adapter)
substrate = { git = "https://github.com/KooshaPari/substrate", default-features = false }
runtime-process = { git = "https://github.com/KooshaPari/substrate", package = "runtime-process" }
sysinfo = "0.30"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[workspace]
members = []
