[workspace]
resolver = "2"
members = [
    "crates/substrate",
    "crates/substrate-core",
    "crates/engine-spec",
    "crates/engine-forge",
    "crates/transport-file",
    "crates/store-file",
    "crates/substrate-app",
    "crates/driver-cli",
    "crates/driver-http",
    "crates/driver-argv",
    "crates/driver-mcp",
    "crates/gateway",
    "crates/arch-test",
    "crates/omniroute-adapter",
    "crates/routing-phenotype-router",
    "tools/fake-forge",
    "crates/a2a",
    "crates/store-sqlite",
    "crates/supervisor",
    "crates/wave",
    "crates/engine-conformance",
    "crates/engine-codex",
    "crates/engine-claude",
    "crates/engine-agentapi",
    "crates/cliproxy-adapter",
    "crates/substrate-trace",
    "crates/substrate-schedule",
    "crates/substrate-dag",
    "crates/substrate-skills",
    "crates/substrate-memory",
    "crates/runtime-process",
    "crates/file-watcher",
    "crates/phenotype-mcp",
    "crates/context-budget",
    "crates/wave-3lane-tests",
]
[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/KooshaPari/substrate"
rust-version = "1.80"

[workspace.dependencies]
substrate-core = { version = "0.1.0", path = "crates/substrate-core" }
substrate-trace = { version = "0.1.0", path = "crates/substrate-trace" }
pheno-otel = { path = "../PhenoObservability/pheno-otel" }
substrate-app = { version = "0.1.0", path = "crates/substrate-app" }
engine-spec = { version = "0.1.0", path = "crates/engine-spec" }
a2a = { version = "0.1.0", path = "crates/a2a" }
store-sqlite = { version = "0.1.0", path = "crates/store-sqlite" }
engine-forge = { version = "0.1.0", path = "crates/engine-forge" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
uuid = { version = "1.11", features = ["v4", "serde"] }
async-trait = "0.1"
tokio = { version = "1.42", features = ["rt", "rt-multi-thread", "macros", "process", "io-util", "sync", "time"] }
regex = "1.11"
anyhow = "1.0"
clap = { version = "4.5", features = ["derive", "env"] }
toml = "1.1"
tempfile = "3.14"
assert_cmd = "2.0"
predicates = "3.1"
dotenvy = "0.15"
chrono = { version = "0.4", features = ["serde"] }
rusqlite = { version = "0.40", features = ["bundled"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
croner = "3.0"
petgraph = "0.8"
strsim = "0.11"
command-group = { version = "5.0", features = ["with-tokio"] }
notify-debouncer-mini = "0.7"
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.7", features = ["trace"] }
http-body-util = "0.1"
futures = "0.3"
futures-core = "0.3"
parking_lot = "0.12"

[profile.release]
strip = true
