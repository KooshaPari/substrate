[workspace]
# Standalone; not part of the repos/ parent workspace.

[package]
name = "thegent-dispatch"
version = "0.1.0"
edition = "2024"
description = "Unified CLI dispatcher: route prompts to Forge/Codex/Gemini/Copilot/Cursor/Droid"
license = "MIT"

[[bin]]
name = "thegent-dispatch"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
figment = { version = "0.10", features = ["toml", "env"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Phenotype-org shared terminal-UX toolkit. Used for human-facing dry-run
# output; degrades to plain ASCII on non-kitty terminals / non-TTY / CI.
rck-core = { git = "https://github.com/KooshaPari/rich-cli-kit", rev = "4db13bcd7ab1ed1c8113cf755178da418ae6a519" }
