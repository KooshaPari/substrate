name: Release Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: substrate-linux-x86_64.tar.gz
            binary: substrate
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: substrate-windows-x86_64.zip
            binary: substrate.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: substrate-macos-arm64.tar.gz
            binary: substrate
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Add build target
        run: rustup target add ${{ matrix.target }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build slim release binary
        run: cargo build --release -p driver-cli --target ${{ matrix.target }}

      - name: Strip debug symbols (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} artifact/
          cd artifact
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a ../${{ matrix.archive }} ${{ matrix.binary }}
          else
            tar -czf ../${{ matrix.archive }} ${{ matrix.binary }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true