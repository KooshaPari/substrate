name: Deny

# cargo-deny: license + ban + advisory + source policy enforcement.
# Config source of truth: deny.toml

on:
  push:
    branches: [main]
    paths:
      - 'deny.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - 'deny.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC (after audit)
  workflow_dispatch:

concurrency:
  group: deny-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: Run cargo-deny (licenses, bans, advisories, sources)
        run: cargo deny check
