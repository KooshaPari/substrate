name: Release Crates

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run without publishing'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      CARGO_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-workspaces plugin
        run: cargo install cargo-workspaces --locked

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish all workspace crates in dependency order
        run: bash ./scripts/release-crates-publish.sh
