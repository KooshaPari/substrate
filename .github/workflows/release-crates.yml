name: Release Crates

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run without publishing'
        required: false
        default: 'false'
      batch_start:
        description: 'Zero-based public crate batch offset'
        required: false
        default: '0'
      batch_size:
        description: 'Public crates per run (maximum 10)'
        required: false
        default: '10'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      CARGO_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      PUBLISH_BATCH_START: ${{ github.event.inputs.batch_start || '0' }}
      PUBLISH_BATCH_SIZE: ${{ github.event.inputs.batch_size || '10' }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish bounded public crate batch
        run: bash ./scripts/release-crates-publish.sh
