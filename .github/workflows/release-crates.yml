name: Release Crates

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run without publishing'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # Pin untrusted workflow inputs via env to defang GitHub Actions
      # template-injection vectors. See .github/workflows/README for the
      # security guidance this follows.
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      EVENT_NAME: ${{ github.event_name }}
      CARGO_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-workspaces plugin
        run: cargo install cargo-workspaces --locked

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish all workspace crates to crates.io
        run: |
          bash ./scripts/release-crates-publish.sh
