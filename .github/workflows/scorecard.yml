name: Scorecard

# OSSF Security Scorecard: measures supply-chain security practices.
# Publishes results to the Security tab and uploads SARIF to code-scanning.

on:
  branch_Protection_Rule:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 3'  # Wednesdays 08:00 UTC
  workflow_dispatch:

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analysis:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@086b6f6c4b38d3229e546af95803e6e9c2553ae3 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@5d5d22a31266ced268874388b861c4a24d9c5d28 # v4.4.0
        with:
          name: results.sarif
          path: results.sarif
          retention-days: 30
