name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  

jobs:
  # Secret Scanning
  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose --redact

  # SAST Scanning
  sast:
    name: SAST Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.14.1

      - name: Run Clippy Security Lints
        run: cargo clippy -- -D warnings -W clippy::panic -W clippy::unwrap_used

      - name: Run Cargo Audit
        uses: actions-rust-lang/audit@72c09e02f132669d52284a3323acdb503cfc1a24
        with:
          file: Cargo.lock

      

  # Dependency Vulnerability Scanning
  dependencies:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Cargo Audit
        run: |
          cargo install cargo-audit
          cargo audit

      

  # Container Scanning (if Dockerfile exists)
  container:
    name: Container Scan
    runs-on: ubuntu-latest
    if: ${{ hashFiles('Dockerfile') != '' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build image
        run: docker build -t ${{ github.event.repository.name }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc
        with:
          image-ref: '${{ github.event.repository.name }}:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
