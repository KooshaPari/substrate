name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 09:00 PDT cron (ADR-042 cadence)
    - cron: '0 16 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write
  id-token: write   # required for SLSA provenance

jobs:
  codeql:
    name: CodeQL (rust)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: cargo audit
        run: |
          cargo install --locked cargo-audit || true
          cargo audit

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  sbom:
    name: SBOM generation (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Generate SBOM (cargo-cyclonedx)
        run: |
          cargo install --locked cargo-cyclonedx || true
          cargo cyclonedx --format json --override-filename ${{ github.repository }}.sbom.json || cargo cyclonedx --format json
        continue-on-error: true
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: ${{ github.workspace }}/*.cdx.json
        if: always()

  provenance-subject:
    name: Build provenance subject
    runs-on: ubuntu-latest
    needs: [codeql, dependency-audit, gitleaks]
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release -p driver-cli
      - name: Hash release binary
        id: hash
        run: echo "hashes=$(sha256sum target/release/substrate | base64 -w0)" >> "$GITHUB_OUTPUT"

  slsa-provenance:
    name: SLSA Build Level 3 provenance
    needs: provenance-subject
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.provenance-subject.outputs.hashes }}
