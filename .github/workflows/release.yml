# ============================================================================
# Release Pipeline — cargo-dist + platform tray clients
# ============================================================================
# Triggered by any tag matching `v*`.  Builds:
#   Linux  · sharecli CLI + sharecli-tray (ksni) + sharecli-ipc daemon → .tar.gz
#   macOS  · sharecli CLI + sharecli-ipc daemon + ShareCLITray.app     → .tar.gz
#   Windows· sharecli CLI + sharecli-ipc daemon + ShareCLITray.exe     → .zip
#
# The Rust binaries use the standard release profile (LTO, stripped).
# For the tray clients that live outside Cargo (Swift .app, WinUI 3 .exe)
# separate build steps run after the Rust workspace finishes.
# ============================================================================

name: Release

# Manual release pipeline. Triggered by a `chore(release): ...` commit on main
# or via workflow_dispatch. Builds, signs, and publishes to crates.io.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not publish)'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

# ---------------------------------------------------------------------------
# Reusable composite action: build Rust workspace for a given target triple
# ---------------------------------------------------------------------------
jobs:
  build:
    name: Build + Test (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"
      - name: Build release artifacts
        run: cargo build --release --locked --all-targets
      - name: Test release build
        run: cargo test --release --locked --all-features

  attest:
    name: SLSA Build Attestation (L2)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          find target/release -maxdepth 1 -type f -executable \
            -exec cp -t release-artifacts/ {} + 2>/dev/null || true
          ls -la release-artifacts/
      - name: Upload artifacts
        uses: actions/upload-artifact@5d5d22a31266ced268874388b861c4a24d9c5d28 # v4.4.0
        with:
          name: release-artifacts
          path: release-artifacts/
          retention-days: 90
          if-no-files-found: warn
      - name: Attest build provenance
        uses: slsa-framework/slsa-github-generator/attest-build-provenance@ed8a9d96c023b81521c9c9fb6c2a6e3edff257d7 # v1.9.0
        with:
          artifact-name: release-artifacts

  publish:
    name: Publish to crates.io
    needs: build
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Publish (uses CARGO_REGISTRY_TOKEN from environment)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo ">> DRY RUN — running cargo publish --dry-run"
            cargo publish --dry-run --locked
          else
            echo ">> LIVE PUBLISH"
            cargo publish --locked
          fi
    name: Build + Test (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"
      - name: Build release artifacts
        run: cargo build --release --locked --all-targets
      - name: Test release build
        run: cargo test --release --locked --all-features

  attest:
    name: SLSA Build Attestation (L2)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          find target/release -maxdepth 1 -type f -executable \
            -exec cp -t release-artifacts/ {} + 2>/dev/null || true
          ls -la release-artifacts/
      - name: Upload artifacts
        uses: actions/upload-artifact@5d5d22a31266ced268874388b861c4a24d9c5d28 # v4.4.0
        with:
          name: release-artifacts
          path: release-artifacts/
          retention-days: 90
          if-no-files-found: warn
      - name: Attest build provenance
        uses: slsa-framework/slsa-github-generator/attest-build-provenance@ed8a9d96c023b81521c9c9fb6c2a6e3edff257d7 # v1.9.0
        with:
          artifact-name: release-artifacts

  publish:
    name: Publish to crates.io
    needs: build
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Publish (uses CARGO_REGISTRY_TOKEN from environment)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo ">> DRY RUN — running cargo publish --dry-run"
            cargo publish --dry-run --locked
          else
            echo ">> LIVE PUBLISH"
            cargo publish --locked
          fi
