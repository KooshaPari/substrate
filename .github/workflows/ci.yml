name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace

      - name: Install cargo-nextest
        run: cargo install --locked cargo-nextest --version 0.9.85

      - name: Prebuild cloud-codex conformance fixture
        run: cargo build -p fake-codex-cloud

      - name: Test workspace
        timeout-minutes: 30
        run: cargo nextest run --workspace --profile ci

      - name: Upload nextest report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: nextest-junit
          path: target/nextest/ci/junit.xml
          if-no-files-found: error

      - name: Clippy
        run: cargo clippy --workspace --lib

      - name: Build driver-http
        run: cargo build -p driver-http

      - name: Publish dry-run (SDK crates)
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [patch.crates-io]
          substrate-core = { path = "crates/substrate-core" }
          engine-spec = { path = "crates/engine-spec" }
          substrate-app = { path = "crates/substrate-app" }
          a2a = { path = "crates/a2a" }
          EOF
          cargo publish --dry-run -p substrate-core
          cargo publish --dry-run -p substrate

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install driver-mcp dependencies
        run: pip install -r driver-mcp/requirements.txt

      - name: Test driver-mcp
        run: pytest driver-mcp/
