name: CI

# Pin all third-party actions to commit SHAs to prevent supply-chain drift.
# Update via `just update-actions` (manual) or dependabot group `github-actions`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run clippy (deny warnings)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build tests
        run: cargo test --no-run --locked --all-features
      - name: Run tests
        run: cargo test --locked --all-features

  build:
    name: cargo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build (debug)
        run: cargo build --locked --all-features
      - name: Build (release)
        run: cargo build --release --locked --all-features

  ci-success:
    name: CI Success
    needs: [fmt, clippy, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        if: needs.fmt.result == 'success' && needs.clippy.result == 'success' && needs.test.result == 'success' && needs.build.result == 'success'
        run: |
          echo "CI pipeline complete"
          echo "fmt:     ${{ needs.fmt.result }}"
          echo "clippy:  ${{ needs.clippy.result }}"
          echo "test:    ${{ needs.test.result }}"
          echo "build:   ${{ needs.build.result }}"
