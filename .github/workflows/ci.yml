name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace

      - name: Test workspace
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build driver-http
        run: cargo build -p driver-http

      - name: Publish dry-run (SDK crates)
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [patch.crates-io]
          substrate-core = { path = "crates/substrate-core" }
          engine-spec = { path = "crates/engine-spec" }
          substrate-app = { path = "crates/substrate-app" }
          a2a = { path = "crates/a2a" }
          EOF
          cargo publish --dry-run -p substrate-core
          cargo publish --dry-run -p substrate
