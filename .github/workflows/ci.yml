name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace

      - name: Test workspace
        timeout-minutes: 30
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build driver-http
        run: cargo build -p driver-http

      - name: Publish dry-run (SDK crates)
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [patch.crates-io]
          substrate-core = { path = "crates/substrate-core" }
          engine-spec = { path = "crates/engine-spec" }
          substrate-app = { path = "crates/substrate-app" }
          a2a = { path = "crates/a2a" }
          EOF
          cargo publish --dry-run -p substrate-core
          cargo publish --dry-run -p substrate

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install driver-mcp dependencies
        run: pip install -r driver-mcp/requirements.txt

      - name: Test driver-mcp
        run: pytest driver-mcp/
