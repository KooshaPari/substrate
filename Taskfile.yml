version: '3'

tasks:
  default:
    desc: List available tasks
    cmds: [task --list-all]

  build:
    desc: cargo build --workspace
    cmds: [cargo build --workspace]

  test:
    desc: cargo test --workspace
    cmds: [cargo test --workspace]

  lint:
    desc: cargo clippy + rustfmt --check
    cmds:
      - cargo clippy --workspace -- -D warnings
      - cargo fmt --check

  fmt:
    desc: cargo fmt
    cmds: [cargo fmt]

  audit:
    desc: cargo deny check + cargo audit
    cmds:
      - cargo deny check
      - cargo audit

  ci:
    desc: Run full local CI sweep (lint + test + audit)
    cmds:
      - task: lint
      - task: test
      - task: audit

  docs:
    desc: cargo doc --no-deps --workspace
    cmds: [cargo doc --no-deps --workspace]

  grade:
    desc: Full grade (strictest — no caching)
    cmds:
      - ./grade.sh

  grade-fast:
    desc: Fast grade (skips heavy checks)
    cmds:
      - ./grade.sh --fast

  grade-json:
    desc: Grade with JSON output
    cmds:
      - ./grade.sh --json

  grade-html:
    desc: Grade with HTML report
    cmds:
      - ./grade.sh --html

  install-lefthook:
    desc: Install lefthook git hooks
    cmds:
      - lefthook install
    status:
      - test -f .git/hooks/lefthook
